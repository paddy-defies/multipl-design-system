name: multipl_design_system
description: Multipl Design System V5 — Flutter widget library, design tokens, and app theme. 45 components built on Gilroy typography with gold/teal brand palette.
version: 1.0.0
homepage: https://paddy-defies.github.io/multipl-design-system

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/Gilroy/

  fonts:
    - family: Gilroy
      fonts:
        - asset: assets/fonts/Gilroy/Gilroy-Regular.ttf
          weight: 400
        - asset: assets/fonts/Gilroy/Gilroy-Medium.ttf
          weight: 500
        - asset: assets/fonts/Gilroy/Gilroy-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Gilroy/Gilroy-Bold.ttf
          weight: 700
        - asset: assets/fonts/Gilroy/Gilroy-ExtraBold.ttf
          weight: 800
